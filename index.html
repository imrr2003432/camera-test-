<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار الكاميرا</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f0f0; }
        video { width: 100%; max-width: 400px; border-radius: 10px; border: 3px solid #333; }
        #canvas { display: none; }
        img { width: 100%; max-width: 400px; margin-top: 10px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .btn { background: #007bff; color: white; padding: 15px 30px; border: none; border-radius: 5px; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>
    <h2>اضغط "موافق وغصبا علي" لتجربة الكاميرا</h2>
    <video id="video" autoplay playsinline></video>
    <br><br>
    <button class="btn" id="snap">التقاط الصورة</button>
    <canvas id="canvas"></canvas>
    <div id="result"></div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const snap = document.getElementById('snap');
        const result = document.getElementById('result');

        // طلب الوصول للكاميرا بمجرد فتح الصفحة
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => {
                video.srcObject = stream;
            })
            .catch(err => {
                alert("خطأ: يرجى السماح بالوصول للكاميرا من إعدادات المتصفح.");
            });

        // تنفيذ التقاط الصورة عند الضغط
        snap.addEventListener('click', () => {
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0);
            
            const dataUrl = canvas.toDataURL('image/png');
            result.innerHTML = `<h3>تم الالتقاط بنجاح:</h3><img src="${dataUrl}" />`;
            
            // هنا تكدر تضيف كود لإرسال الصورة لسيرفرك إذا كنت مبرمج
            console.log("Image Captured!");
        });
    </script>
</body>
</html>
